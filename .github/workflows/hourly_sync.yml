name: Hourly Marketing Data Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour at minute 0
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    name: Run Marketing Sync Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data google-ads requests psycopg2-binary

      - name: Run sync script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GA4_CREDS_JSON: ${{ secrets.GA4_CREDS_JSON }}
          META_CREDS_JSON: ${{ secrets.META_CREDS_JSON }}
          GOOGLE_ADS_YAML: ${{ secrets.GOOGLE_ADS_YAML }}
        run: |
          python lantern-dashboard/api/local_sync.py
